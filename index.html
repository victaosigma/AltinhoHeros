      break

    case "ArrowRight":
    case "KeyD":
      keys.right = true
      break

    case "ArrowUp":

      break

    case "ArrowDown":

      break

    case "ControlRight":

})

function toggleKey(key) {
  keys[key] = !keys[key]
  
  if(key === "run"){
     if(keys[key]) run.style.backgroundImage = "url('https://raw.githubusercontent.com/victaosigma/AltinhoHeros/refs/heads/main/assets/images/ui/runOn.png')"
     else run.style.backgroundImage = "url('https://raw.githubusercontent.com/victaosigma/AltinhoHeros/refs/heads/main/assets/images/ui/runOff.png')"
  }
  else if(key === "hold"){
     if(keys[key]) hold.style.backgroundImage = "url('https://raw.githubusercontent.com/victaosigma/AltinhoHeros/refs/heads/main/assets/images/ui/holdOn.png')"
     else hold.style.backgroundImage = "url('https://raw.githubusercontent.com/victaosigma/AltinhoHeros/refs/heads/main/assets/images/ui/holdOff.png')"
  }
}

function pause() {
  if (state !== "game" && state !== "paused") return

  if (state === "game") {
    state = "paused"

    const cx = c.width / 2
    const cy = c.height / 2
    const r = Math.max(c.width, c.height) / 1.2

    const g = ctx.createRadialGradient(
      cx, cy, r * 0.1,
      cx, cy, r
    )

    g.addColorStop(0, "rgba(58, 21, 110, 0.3)")
    g.addColorStop(0.6, "rgba(24, 12, 69, 0.5)")
    g.addColorStop(1, "rgba(7, 5, 33, 0.7)")

    ctx.fillStyle = g
    ctx.fillRect(0, 0, c.width, c.height)
    
    ctx.strokeStyle = "#303447"
    ctx.lineWidth = 5

    ctx.fillStyle = "#fff"
    ctx.font = "32px 'Press Start 2P'"
    ctx.textAlign = "center"
    ctx.textBaseline = "middle"
     
     const dx = c.width/2
     const dy = c.height/2
     
    const textGradient = ctx.createLinearGradient(0, dy, 0, dy + 16)

     textGradient.addColorStop(0, "#ffffff")
     textGradient.addColorStop(0.15, "#c3c8db")
     textGradient.addColorStop(0.5, "#898fab")
     textGradient.addColorStop(1, "#5d6380")
      
     ctx.fillStyle = textGradient
     ctx.strokeText("Paused", dx, dy)
     ctx.fillText("Paused", dx, dy)
       
     ctx.shadowBlur = 0
  }
  else {
    state = "game"
  }
}

function ability(){
  if(!player.move)return
  if(player.mode==="npc"&&!player.immortal){
      if(!inventory||levels.levels[level].lockInventory)return
      audios.pastelEat.currentTime = 0.2
      audios.pastelEat.play()
      
      if(inventory==="pastel"){
           player.immortal = true
           player.immortalTime = 400
           createParticle("checkpointStars", 5, player.x + player.w/2, player.y + player.h/2, sort(-1,1,true), sort(-1,1,true))
      } else if(inventory==="burguer")toggleJeff()
      
      inventory = null
  }
  else if(player.onGround && !player.abilityCooldown && player.mode === "bigJeff"){
        audios.jeffAbility.play()
        player.state = "ability"
        player.animFrame = 0
        
        shakeCamera(60,10)
        createParticle("dirtSplash", 5, player.x, player.y+player.h)
        
        const attackDistLinear = 200
        const attackDist = attackDistLinear**2
        
        enemiesPexeira.filter(enemy => {
             const distX = player.x-enemy.x
             const distY = player.y-enemy.y
             return distX*distX + distY*distY <= attackDist
        }).forEach(killEnemy)
        enemiesTongoloide.filter(enemy => {
             const distX = player.x-enemy.x
             const distY = player.y-enemy.y
             return distX*distX + distY*distY <= attackDist
        }).forEach(killEnemy)
        enemiesRosal.filter(enemy => {
             const distX = player.x-enemy.x
             const distY = player.y-enemy.y
             return distX*distX + distY*distY <= attackDist
        }).forEach(killEnemy)
        
        for (let i = platforms.length - 1; i >= 0; i--) {
           const p = platforms[i]
           if (!p.breakable) continue
           
           let distX = Infinity
           if(player.x < p.x) distX = player.x - p.x
           else if(player.x > p.x+p.w) distX = player.x - (p.x+p.w)
           else distX = 0
           
           if (Math.abs(distX) <= attackDistLinear && player.y+player.h>p.y) {
                createParticle("woodBreak", 5, p.x + p.w / 2, player.y)
                
                platforms.splice(i, 1)
           }
        }
        
        player.abilityCooldown = 180
        player.move = false
        setTimeout(() => {
          player.move = true
        }, 1000)
  }
}

// essentials

function clamp(min,max,x){
    return Math.max(min, Math.min(max, x))
}

function lerp(value, target, speed,fix=0.05){
    const v = value + (target - value) * speed / 100
    return Math.abs(v - target) <= fix ? target : v
}

function getLerpTime(value, target, speed){
    return Math.max(
        0,
        Math.log(0.05 / Math.abs(target - value)) /
        Math.log(1 - speed / 100) /
        45
    )
}

function sort(min, max, nonIntegers = false, maxDPlace = 2) {
    if (nonIntegers) {
        const factor = 10**maxDPlace
        return Math.floor((Math.random() * (max - min) + min) * factor) / factor
    }
    return Math.floor(Math.random() * (max - min + 1)) + min
}

function wrapText(text,maxWidth) {
  const paragraphs = text.split("\n");
  const lines = [];

  paragraphs.forEach(paragraph => {
    const words = paragraph.split(" ");
    let line = "";

    words.forEach((word, i) => {
      const testLine = line + word + " ";
      const width = ctx.measureText(testLine).width;

      if (width > maxWidth && i > 0) {
        lines.push(line);
        line = word + " ";
      } else {
        line = testLine;
      }
    });

    lines.push(line);
  });

  return lines;
}

function startFade(direction, callback){
  fadeDirection = direction
  fadeCallback = callback

function isOnScreen(o,margin = 0){
  return (
    o.x + o.w >= cameraX - margin &&
    o.x <= cameraX + c.width + margin &&
    o.y + o.h >= cameraY - margin &&
    o.y <= cameraY + c.height + margin
  )
}

function isNearScreen(o,range = 200){
  return (
    o.x + o.w >= cameraX - range &&
    o.x <= cameraX + c.width + range
  )
}

function isNearElement(e,o,range = 200){
  return (
    o.x + o.w >= e.x - range &&
    o.x <= e.x + e.w + range
  )
}

function distanceFromGround(x, y, w){
    let dy = Infinity

    const ground = platforms.filter(p =>
        x + w > p.x && p.x + p.w > x
    )

    for (let i = 0; i < ground.length; i++){
        const plat = ground[i]
        if (plat.y < y) continue

        const platDist = plat.y - y

        if (platDist < dy) {
            dy = platDist
        }
    }

    return dy
}

function rect(a,b){
return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y
}

function collision(o,options={}){
    const p = prevFramePlayer
    
    const elasticity = options.elasticity ?? 0
    const offset = {
         top: options.offsetTop ?? options.offset ?? 0,
         down: options.offsetDown ?? options.offset ?? 0,
         left: options.offsetLeft ?? options.offset ?? 0,
         right: options.offsetRight ?? options.offset ?? 0,
    }
    const box = {
         top: !options.reverseHeight ? o.y - offset.top : o.y - o.h - offset.top,
         down: !options.reverseHeight ? o.y + o.h + offset.down : o.y + offset.down,
         left: o.x - offset.left,
         right: o.x + o.w + offset.right
    }

    if(
        !options.disableTop &&
        p.y + p.h <= box.top &&
        player.y + player.h > box.top &&
        player.x + player.w > box.left &&
        box.right > player.x
    ){
        if(player.mode === "bigJeff" && player.vy >= 15){
            audios.jeffImpact.play()
            createParticle("dirtSplash",5,player.x,player.y+player.h)
            shakeCamera(10,4)
        }
        
        player.y = box.top - player.h
        player.vy = Math.abs(player.vy * -elasticity) > elasticity ? player.vy * -elasticity : 0
        player.onGround = true
        if(options.type==="topPlatform")player.onTopPlatform = true
        if(options.type==="topPlatformStack"){
            player.onTopPlatform = true
            player.onStackablePlatform = true
        }
    }

    else if(
        !options.disableDown &&
        p.y >= box.down &&
        player.y < box.down &&
        player.x + player.w > box.left &&
        box.right > player.x
    ){
        player.y = box.down
        player.vy = Math.abs(player.vy * -elasticity) > elasticity ? player.vy * -elasticity : 0
    }

    else if(
        !options.disableLeft &&
        p.x + p.w <= box.left &&
        player.x + player.w > box.left &&
        player.y + player.h > box.top &&
        player.y < box.down
    ){
        player.x = box.left - player.w
    }

    else if(
        !options.disableRight &&
        p.x >= box.right &&
        player.x < box.right &&
        player.y + player.h > box.top &&
        player.y < box.down
    ){
        player.x = box.right
    }
}

function collisionElement(o,e,options={}){
    const p = e.prev ?? {
            x: e.x - e.vx,
            y: e.y - e.vy
    }
    
    const isOnFloor = rect(e,o)
    
    const elasticity = options.elasticity ?? 0
    const offset = {
         top: options.offsetTop ?? options.offset ?? 0,
         down: options.offsetDown ?? options.offset ?? 0,
         left: options.offsetLeft ?? options.offset ?? 0,
         right: options.offsetRight ?? options.offset ?? 0,
    }
    const box = {
         top: !options.reverseHeight ? o.y - offset.top : o.y - o.h - offset.top,
         down: !options.reverseHeight ? o.y + o.h + offset.down : o.y + offset.down,
         left: o.x - offset.left,
         right: o.x + o.w + offset.right
    }

    if(
        !options.disableTop &&
        p.y + e.h <= box.top &&
        e.y + e.h > box.top &&
        e.x + e.w > box.left &&
        box.right > e.x
    ){
        e.y = box.top - e.h
        e.vy = Math.abs(e.vy * -elasticity) > elasticity ? e.vy * -elasticity : 0
        e.onGround = true
        if(options.type==="topPlatform")e.onTopPlatform = true
    }

    else if(
        !options.disableDown &&
        p.y >= box.down &&
        e.y < box.down &&
        e.x + e.w > box.left &&
        box.right > e.x
    ){
        e.y = box.down
        e.vy = Math.abs(e.vy * -elasticity) > elasticity ? e.vy * -elasticity : 0
    }

    else if(
        !options.disableLeft &&
        p.x + e.w <= box.left &&
        e.x + e.w > box.left &&
        e.y + e.h > box.top &&
        e.y < box.down
    ){
        e.x = box.left - e.w
        if(options.stroll)e.vx*=-1
    }

    else if(
        !options.disableRight &&
        p.x >= box.right &&
        e.x < box.right &&
        e.y + e.h > box.top &&
        e.y < box.down
    ){
        e.x = box.right
        if(options.stroll)e.vx*=-1
    }
    
    if(e.onGround&&options.stroll&&isOnFloor){
       const frontX = e.vx>0 ? e.x+e.w+1 : e.x-1
       const footY = e.y+e.h+2
       const hasFloor = frontX>o.x && frontX<o.x+o.w && footY>=o.y && footY<=o.y+5
       
       if(!hasFloor){
           e.vx*=-1
           e.x += e.vx
       }
    }
}

function isOnHouse(h,p) {
    const size = 64*eneScale
    
    return p.x < h.x + size &&
       p.x + p.w > h.x &&
       p.y < h.y &&
       p.y + p.h > h.y - size * h.floors
}

function houseRamp(h,p) {
    const rampStart = h.x + 30
    const rampEnd = h.x + h.w - 30
    if(p.x >= h.x && p.x <= h.x + h.w){
            const rampHeight = 64*eneScale*(h.floors-1)
            let yMod = clamp(0, 1, ((p.x - rampStart) / (rampEnd - rampStart)))
            if(h.direction==="down") yMod = 1 - yMod
            
            const height = h.y - yMod*rampHeight
            
            if(p.y + p.h > height) {
                            p.y = height - p.h
                            p.vy = 0
                            p.onGround = true
            }
    }
}

function solidCollision(a,b){
if(!rect(a,b))return

const dx1 = a.x + a.w - b.x
const dx2 = b.x + b.w - a.x
const dy1 = a.y + a.h - b.y
const dy2 = b.y + b.h - a.y

const minX = Math.min(dx1,dx2)
const minY = Math.min(dy1,dy2)

if(minX < minY){
if(dx1 < dx2) a.x = b.x - a.w
else a.x = b.x + b.w
}
else{
if(dy1 < dy2){
a.y = b.y - a.h
a.vy = 0
a.onGround = true
}
else{
a.y = b.y + b.h
a.vy = 0
}
}
}

function solidCollisionForStroll(a,b){
if(!rect(a,b))return

const dx1 = a.x + a.w - b.x
const dx2 = b.x + b.w - a.x
const dy1 = a.y + a.h - b.y
const dy2 = b.y + b.h - a.y

const minX = Math.min(dx1,dx2)
const minY = Math.min(dy1,dy2)

if(minX < minY){
a.vx *= -1
if(dx1 < dx2) a.x = b.x - a.w
else a.x = b.x + b.w
}
else{
if(dy1 < dy2){
a.y = b.y - a.h
a.vy = 0
a.onGround = true
}
else{
a.y = b.y + b.h
a.vy = 0
}
}
}

    createParticle("checkpointStars", 5, p.x + p.w/2, p.y + p.h/2, sort(-1,1,true), sort(-1,1,true))
    pasteis.splice(i, 1)
  }
}

if(player.immortal){
player.immortalTime--
if(player.immortalTime<=0)player.immortal=false
}

if(player.mode!=="npc"){
player.powerUpTime--
if(player.powerUpTime<=0)toggleNpc()
}

if(player.y>670) die({ cause:"fell", coinLoss:10, ignoreImmortal:true })

if(shakeTime > 0) shakeTime--
else shakeStrength = 0

cameraX=player.x-c.width/2 + (Math.random() - 0.5)*shakeStrength
if(levelData.lockCamera || cameraX<0)cameraX=0

cameraY=player.y<670?player.y-c.height/2  + (Math.random() - 0.5)*shakeStrength:cameraY
if(levelData.lockY)cameraY=levelData.lockY-player.h-c.height/2

if (fadeDirection !== 0) {
  fadeAlpha += fadeSpeed * fadeDirection

  if (fadeAlpha >= 1) {
    fadeAlpha = 1
    fadeDirection = 0
    if (fadeCallback) fadeCallback()
  }

  if (fadeAlpha <= 0) {
  fadeAlpha = 0
  fadeDirection = 0
  }
}

}

function drawTopPlatform(p){
    const img = platformImgs[p.type] || platformImgs.stone1
    if(!img || !img.complete) return

    const tileW = 16 * objScale
    const tileH = 512 * objScale

    let visualStart = Math.floor(p.x - cameraX - tileW)
    const startY = Math.floor(p.y - 40*objScale - cameraY)

    const tiles = Math.ceil(p.w / tileW)

    for(let i = 0; i < tiles + 2; i++){
        let sx

        if(i === 1){
            sx = 0
            visualStart = visualStart + 13
        }
        else if(i === tiles + 1){
            sx = 33
            visualStart = visualStart - 13
        }
        else{
            sx = 17
            visualStart = Math.floor(p.x - cameraX - tileW)
        }
        
        const offsetI = i === 0 ? 1 : i === 1 ? 0 : i

        ctx.drawImage(
            img,
            sx, 0, 16, 512,
            visualStart + offsetI * tileW,
            startY,
            tileW,
            tileH
        )
    }
}

function drawPlatform(p){
    const img = platformImgs[p.type] || platformImgs.stone1
    if(!img || !img.complete) return

    const tileW = 16 * objScale
    const tileH = 40 * objScale

    const tiles = Math.round((p.visualW + 26*objScale) / tileW)

    const startY = Math.floor(p.y - 38*objScale - cameraY)

    for(let i=0;i<tiles;i++){
        let sx

        if(i===0) sx = 0
        else if(i===tiles-1) sx = 33
        else sx = 17

        ctx.drawImage(
            img,
            sx,0,16,40,
            Math.floor(p.x - 6*objScale - cameraX) + i*tileW,
            startY,
            tileW,
            tileH
        )
    }
}

function drawHouses(h) {
  const theme = houseImgs.find(e => e.theme === h.theme).images

  const tileW = 64 * eneScale
  const tileH = 64 * eneScale

  const floors = h.floors
  const startX = Math.floor(h.x - cameraX)
  const startY = Math.floor(h.y - cameraY - floors*tileH)

  for (let i = 0; i < floors; i++) {
    if(!h.color.get(i)) h.color.set(i,Math.floor(Math.random() * theme.length))
    const img = theme[h.color.get(i) ?? 0]
    if (!img || !img.complete) return

    const y = startY + i * tileH

    ctx.drawImage(
      img,
      startX,
      y,
      tileW,
      tileH
    )
  }
}

function drawEnemy(enemy,options={}) {
    const size = 64
    const isDead = enemy.state === "dead"
    const isIdle = enemy.state === "idle"

    const frames = 4
    const frame = Math.floor(enemy.animFrame || 0) % frames
    const animY = isDead ? 64 : isIdle ? 128 : 0

    const drawSize = size * eneScale / 2
    const drawX = (options.center!=="false"?enemy.x - cameraX + enemy.w / 2 - drawSize / 2.2:enemy.x - cameraX)+(options.offsetX??0)
    const drawY = enemy.y + enemy.h - drawSize - cameraY
    const flip = enemy.flipped||((typeof enemy.vx === "string" ? eval(enemy.vx) : enemy.vx) > 0)

    ctx.save()

    if (!isDead && flip) {
        ctx.translate(drawX + drawSize, drawY)
        ctx.scale(-1, 1)
        ctx.drawImage(
            enemy.img,
            frame * size,
            animY,
            size,
            size,
            0,
            0,
            drawSize,
            drawSize
        )
    } else {
        ctx.drawImage(
            enemy.img,
            frame * size,
            animY,
            size,
            size,
            drawX,
            drawY,
            drawSize,
            drawSize
        )
    }

    ctx.restore()
    
    if(isDead&&options.deadFix!==false){
       if(enemy.animFrame<4)enemy.animFrame+=0.15
    } else enemy.animFrame+=0.15
}

function drawPlayer(player) {
   const img = player.mode === "npc" && player.immortal ? playersImgs.npcPastel : playersImgs[player.mode] || playersImgs.npc
    if(!img || !img.complete) return
  
    const size = 64
    const frames = 4
    const frame = Math.floor(player.animFrame || 0) % frames
    
    const isUsingAbility = player.state === "ability"
    if(isUsingAbility&&player.animFrame>4){
          idleTime = 0
          player.state = "idle"
    }
    
    const isIdle = player.state === "idle"
    const isIdleLong = player.state === "idle_long"
    const isWalking = player.state === "walking"
    const isJumping = player.state === "jumping"
    const isFalling = player.state === "falling"
    const isDead = player.state === "dead"
    const isComemorating = player.state === "comemorating"
    
    const animY = isIdle ? 0 : isIdleLong ? 64 : isWalking ? 128 : isJumping ? 192 : isFalling ? 256 : isDead ? 320  : isComemorating ? 384 : isUsingAbility ? 448 : 0

    const drawSize = size * eneScale / 2
    const drawX = player.x - cameraX + player.w / 2 - drawSize / 2.2
    const drawY = player.y + player.h - drawSize - cameraY

    ctx.save()

    if (!isDead && flipPlayer) {
        ctx.translate(drawX + drawSize, drawY)
        ctx.scale(-1, 1)
        ctx.drawImage(
            img,
            frame * size,
            animY,
            size,
            size,
            0,
            0,
            drawSize,
            drawSize
        )
    } else {
        ctx.drawImage(
            img,
            frame * size,
            animY,
            size,
            size,
            drawX,
            drawY,
            drawSize,
            drawSize

function drawPropGif(p){
  const fw = 64
  const fh = 128
  const frames = 4

  const drawW = Math.round(fw * (p.small ? propScale/2 : p.big ? propScale*2 : propScale))
  const drawH = Math.round(fh * (p.small ? propScale/2 : p.big ? propScale*2 : propScale))

  if (p.x - cameraX > c.width || p.x - cameraX + drawW < 0) return

  if (typeof p.frame !== "number") p.frame = 0

  const img = propsImgs[p.type]
  if(!img || !img.complete) return

  const frame = Math.floor(p.frame) % frames

  const drawX = (p.x - cameraX) | 0
  const drawY = (p.y - drawH - cameraY) | 0

  ctx.drawImage(
    img,
    frame * fw,
    0,
    fw,
    fh,
    drawX,
    drawY,
    drawW,
    drawH
  )

  p.frame += 0.1
}

function drawParticle(p) {
  const fw = 16
  const fh = 16
  const frames = p.duration

  const drawW = Math.round(fw * propScale)
  const drawH = Math.round(fh * propScale)

  if (p.x - cameraX > c.width || p.x - cameraX + drawW < 0) return

  if (typeof p.frame !== "number") p.frame = 0

  const img = particleImgs[p.type]
  if(!img || !img.complete) return

  const frame = Math.floor(p.frame) % frames

  const drawX = (p.x - cameraX) | 0
  const drawY = (p.y - drawH - cameraY) | 0

  ctx.drawImage(
    img,
    0,
    frame * fh,
    fw,
    fh,
    drawX,
    drawY,
    drawW,
    drawH
  )

  p.frame += 0.1
  p.time += 0.1
}

    if(state!=="map")return
    ctx.clearRect(0,0,c.width,c.height)
    
    const mapImg = mapImgs[world]
    if(!mapImg)return
    
    
    if(selector.moving){
       const movingPoint = mapData.points[selector.movingId]
       
       if(movingPoint.warp==="level"&&level!==movingPoint.id){
          loadLevel(movingPoint.id)
          level = movingPoint.id
       }
       else if(movingPoint.warp==="store"){
          levelData = stores[movingPoint.id]?.data
          level = 0
       }
       
       if(selector.x===movingPoint.x && selector.y===movingPoint.y){
          selector.moving = false
          selector.mapId = selector.movingId
          selector.warp = movingPoint.warp
          selector.id = movingPoint.id
          if(selector.warp==="level")selectTitle=levels.levels[level].title
          else if(selector.warp==="store")selectTitle=stores[selector.id].name
       } else {
          selector.x = lerp(selector.x, movingPoint.x, 8, 0.25)
          selector.y = lerp(selector.y, movingPoint.y, 8, 0.25)
          selectTitle=""
       }

           selector.warping=true

               resetLevel()
               startFade(-1)
           })

     const dy = c.height/2 - 320

     const lines = selectTitle.split("\n")

     lines.forEach((line, i) => {
         const y = dy + i * 10

         const gradient = ctx.createLinearGradient(0, y, 0, y + 16)

         gradient.addColorStop(0, "#ffffff")
         gradient.addColorStop(0.15, "#fff6a0")
         gradient.addColorStop(0.5, "#ffe32e")
         gradient.addColorStop(1, "#c49118")

         ctx.fillStyle = gradient

         ctx.strokeText(line, dx, y)
         ctx.fillText(line, dx, y)
     })
     
     ctx.shadowBlur = 0
     
     if (fadeDirection !== 0) {
       fadeAlpha += fadeSpeed * fadeDirection

       if (fadeAlpha >= 1) {
         fadeAlpha = 1
         fadeDirection = 0
         if (fadeCallback) fadeCallback()
       }

       if (fadeAlpha <= 0) {
         fadeAlpha = 0
         fadeDirection = 0
      }
    }
     
     if (fadeAlpha > 0) {
       ctx.fillStyle = `rgba(0,0,0,${fadeAlpha})`
       ctx.fillRect(0,0,c.width,c.height)
    }
}

// loop

let lastTime = 0
const frameTime = 1000/45

function loop(time){
    if(state==="gameover"||state==="startScreen"){
        if(state==="gameover")gameover()
        else startScreen()
        lastTime = 0
        return
    }
    
    if(!lastTime) lastTime = time
    const delta = time - lastTime

    if(delta >= frameTime){
        lastTime = time
        
        if(state === "map"){
            worldMap()
        }

        if(state !== "paused" && state !== "startScreen" && state !== "demo" && state !== "map"){
            update()
            draw()
        }
    }

    requestAnimationFrame(loop)
}
if(!loaded)loading()
